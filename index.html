<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaharaInsight - Al Qua'a Dashboard</title>
    <!-- Tailwind CSS for clean mobile styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Chart.js for smooth, interactive trends -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

    <!-- Header Navigation -->
    <header class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide text-amber-500">🐪 SaharaInsight</h1>
            <span class="text-xs bg-slate-700 px-2 py-1 rounded-full text-slate-300 font-medium">Al Qua'a Live</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6 pb-20">
        
        <!-- SECTION 1: Market Snapshot Matrix -->
        <section class="space-y-3">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">📊 Market Snapshot Matrix</h2>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p class="text-xs text-slate-400 font-medium">Avg Camel Value</p>
                    <p class="text-xl font-bold text-emerald-400 mt-1">15,500 AED</p>
                    <span class="text-[10px] text-emerald-500 font-medium">▲ +2.4% this month</span>
                </div>
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <p class="text-xs text-slate-400 font-medium">Rhodes Green Feed</p>
                    <p class="text-xl font-bold text-amber-400 mt-1">1,200 AED <span class="text-xs font-normal text-slate-400">/ton</span></p>
                    <span class="text-[10px] text-rose-400 font-medium">▼ -1.5% stable</span>
                </div>
            </div>
        </section>

        <!-- SECTION 2: Cyclical Trend Analytics -->
        <section class="bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-3">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">📈 Cyclical Trend Analytics (12M)</h2>
            <div class="h-48 w-full">
                <canvas id="trendChart"></canvas>
            </div>
        </section>

        <!-- SECTION 3: Livestock Value Calculator -->
        <section class="bg-slate-800 p-4 rounded-xl border border-slate-700 space-y-4">
            <h2 class="text-sm font-semibold uppercase tracking-wider text-slate-400">🧮 Livestock & Feed Calculator</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Herd Size (Number of Camels)</label>
                    <input type="number" id="herdSize" value="10" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-100 focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Daily Feed Cost per Camel (AED)</label>
                    <input type="number" id="dailyFeed" value="15" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-slate-100 focus:outline-none focus:border-amber-500 text-sm">
                </div>
                <button onclick="calculateCosts()" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold py-2.5 px-4 rounded-lg text-sm transition-colors mt-2">
                    Calculate Operational Cost
                </button>
            </div>
            
            <!-- Result Box -->
            <div id="resultBox" class="hidden bg-slate-900/60 p-3 rounded-lg border border-slate-700/50 space-y-1.5 text-xs text-slate-300">
                <p>🔹 Monthly Herd Feed Cost: <span id="monthlyCost" class="font-bold text-amber-400">0 AED</span></p>
                <p>🔹 Projected Capital Security Margin: <span id="securityMargin" class="font-bold text-emerald-400">0 AED</span></p>
            </div>
        </section>

    </main>

    <!-- Dashboard Logic Script -->
    <script>
        // Interactive Chart Configuration
        const ctx = document.getElementById('trendChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Market Value Trend (AED)',
                    data: [14200, 14500, 14100, 14800, 15000, 15200, 15600, 15400, 15300, 15500, 15450, 15500],
                    borderColor: '#f59e0b',
                    borderWidth: 2,
                    tension: 0.3,
                    pointRadius: 2,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                    y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                }
            }
        });

        // Interactive Calculator Logic
        function calculateCosts() {
            const size = parseFloat(document.getElementById('herdSize').value) || 0;
            const feed = parseFloat(document.getElementById('dailyFeed').value) || 0;
            
            const monthlyTotal = size * feed * 30;
            const safetyMargin = (size * 15500) - monthlyTotal; // Evaluation balance minus feed liabilities
            
            document.getElementById('monthlyCost').innerText = monthlyTotal.toLocaleString() + ' AED';
            document.getElementById('securityMargin').innerText = safetyMargin.toLocaleString() + ' AED';
            document.getElementById('resultBox').classList.remove('hidden');
        }
    </script>
</body>
</html>
